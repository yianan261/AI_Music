services:
  app:
    build: .
    image: ai-music:latest
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    stdin_open: true
    tty: true
    # Override to run scripts, e.g.:
    # docker compose run --rm app python prepare_maestro.py
    command: bash

  # Optional: Jupyter for baseline_cqt.ipynb
  jupyter:
    build: .
    image: ai-music:latest
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: bash -c "pip install -q jupyter && jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root"
